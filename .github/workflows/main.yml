name: CI/CD Pipeline

on:
  push:
    branches: ['main']

jobs:
  bump_version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bump Version and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_VERSION=$(grep -oP "(?<=define\( 'SUPER_NERD_BROS_DODO_AIR_VERSION', ')[0-9]+\.[0-9]+\.[0-9]+" super-nerd-bros-dodo-air.php)
          IFS='.' read -r -a PARTS <<< "$CURRENT_VERSION"
          NEW_VERSION="${PARTS[0]}.${PARTS[1]}.$((PARTS[2] + 1))"
          sed -i -E "s/(Version:[[:space:]]*)$CURRENT_VERSION/\1$NEW_VERSION/" super-nerd-bros-dodo-air.php
          sed -i "s/define( 'SUPER_NERD_BROS_DODO_AIR_VERSION', '$CURRENT_VERSION' );/define( 'SUPER_NERD_BROS_DODO_AIR_VERSION', '$NEW_VERSION' );/" super-nerd-bros-dodo-air.php
          git add super-nerd-bros-dodo-air.php
          git commit -m "ci: bump version to v$NEW_VERSION [skip ci]"
          git push
