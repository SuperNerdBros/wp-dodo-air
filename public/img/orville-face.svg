<svg version="1.1" viewBox="0 0 90.8 83.8" xmlns="http://www.w3.org/2000/svg">
<style type="text/css">
	.feathers {fill: #27A9E1;}
	.feathers-shadow {fill: #1D8AB9;}
	.face {fill: #FFD238;}
	.beak-top {fill: #A75C38;}
	.beak-bottom {fill: #823C1C;}
	.beak-inside {fill: #4A1C0A;}
	.eye-white {fill: #FFFFFF;}
	.eye-pupil {fill: #222222;}
	.headset-band {fill: #222222;}
	.headset-ear {fill: #A0C282;}
	.headset-ear-shadow {fill: #7D9F60;}
	.headset-mic {fill: #1A1A1A;}
</style>
<g>
    <!-- Background Head / Feathers -->
    <path class="feathers" d="M 45.4,5 C 65.4,5 75.4,20 75.4,45 C 75.4,65 65.4,80 45.4,80 C 25.4,80 15.4,65 15.4,45 C 15.4,20 25.4,5 45.4,5 Z" />
    
    <!-- Feather Tufts -->
    <!-- Center tuft -->
    <path class="feathers" d="M 42,9 L 45.4,1 L 52,10 Z" />
    <!-- Left tuft -->
    <path class="feathers" d="M 33,18 L 28,5 L 40,11 Z" />
    <!-- Right tuft -->
    <path class="feathers" d="M 55,10 L 65,3 L 59,18 Z" />

    <!-- Headset Band -->
    <path class="headset-band" fill="none" stroke="#222222" stroke-width="4.5" stroke-linecap="round" d="M 18,38 C 18,12 72,12 72,38" />

    <!-- Yellow Face Mask -->
    <path class="face" d="M 15.4,42 C 15.4,22 75.4,22 75.4,42 C 78.4,65 65.4,75 45.4,75 C 25.4,75 12.4,65 15.4,42 Z" />
    
    <!-- Eyes -->
    <!-- Left Eye -->
    <ellipse cx="32" cy="35" rx="8" ry="10" class="eye-white" />
    <circle cx="34" cy="35" r="4.5" class="eye-pupil" />
    
    <!-- Right Eye -->
    <ellipse cx="58" cy="35" rx="8" ry="10" class="eye-white" />
    <circle cx="56" cy="35" r="4.5" class="eye-pupil" />

    <!-- Big Bulbous Beak -->
    <!-- Open Mouth (Dark inside) -->
    <ellipse cx="45.4" cy="62" rx="16" ry="14" class="beak-inside" />
    <!-- Beak Bottom Shadow -->
    <ellipse cx="45.4" cy="65" rx="15" ry="8" class="beak-bottom" />
    <!-- Beak Top -->
    <ellipse cx="45.4" cy="54" rx="20" ry="15" class="beak-top" />
    
    <!-- Headset Ear Cups -->
    <!-- Left Ear (mostly hidden, but visible edge) -->
    <rect x="7.4" y="30" width="10" height="24" rx="4" class="headset-ear-shadow" />
    <rect x="6.4" y="30" width="9" height="24" rx="4" class="headset-ear" />
    <!-- Right Ear -->
    <rect x="73.4" y="30" width="11" height="24" rx="4" class="headset-ear-shadow" />
    <rect x="74.4" y="30" width="10" height="24" rx="4" class="headset-ear" />
    
    <!-- Mic boom -->
    <path class="headset-mic" fill="none" stroke="#1A1A1A" stroke-width="2.5" d="M 75.4,45 C 70,68 62,68 58,64" />
    <circle cx="58" cy="64" r="3.5" class="headset-mic" />
</g>
</svg>
